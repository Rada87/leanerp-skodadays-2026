<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>LeanERP × Škoda GCC</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="presentation" aria-label="LeanERP Škoda GCC presentation">
      <section class="slide slide--hero is-active" data-slide="0" aria-label="Slide 1 of 3">
        <img src="media/leanerp-gcc-reference.png" alt="Lean ERP ready-made SAP S/4HANA logistic solution for CKD plants" />
      </section>

      <section class="slide slide--video" data-slide="1" aria-label="Slide 2 of 3" hidden>
        <div class="video-slide__topline"><span>LEAN ERP</span><span>ŠKODA GCC</span></div>
        <div class="video-frame">
          <video id="presentation-video" controls playsinline preload="metadata" aria-label="Lean ERP presentation video">
            <source src="media/lean-erp-promo.mp4" type="video/mp4" />
          </video>
          <div class="video-placeholder" aria-hidden="true">
            <span class="play-symbol">▶</span>
            <p>Presentation video</p>
            <small>MP4 source will be added here</small>
          </div>
        </div>
        <p class="video-slide__caption">READY-MADE SAP S/4HANA LOGISTIC SOLUTION FOR CKD PLANTS</p>
      </section>

      <section class="slide slide--leaderboard" data-slide="2" aria-label="Slide 3 of 3" hidden>
        <div class="leaderboard-card">
          <header class="leaderboard-card__header">
            <h1>Leaderboard</h1>
            <span>TOP 10</span>
          </header>
          <ol id="leaderboard" class="leaderboard-list" aria-label="Leaderboard entries"></ol>
        </div>
      </section>
    </main>

    <nav class="controls" aria-label="Presentation controls">
      <button class="arrow" type="button" data-action="previous" aria-label="Previous slide">←</button>
      <div class="dots" role="tablist" aria-label="Select slide">
        <button class="dot is-active" type="button" data-go-to="0" role="tab" aria-selected="true" aria-label="Slide 1"></button>
        <button class="dot" type="button" data-go-to="1" role="tab" aria-selected="false" aria-label="Slide 2"></button>
        <button class="dot" type="button" data-go-to="2" role="tab" aria-selected="false" aria-label="Slide 3"></button>
      </div>
      <button class="arrow" type="button" data-action="next" aria-label="Next slide">→</button>
    </nav>

    <script src="script.js"></script>
  </body>
</html>
